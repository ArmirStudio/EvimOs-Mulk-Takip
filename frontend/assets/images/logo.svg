<svg viewBox="0 0 240 80" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D0E8E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0CFCF;stop-opacity:1" />
    </linearGradient>
    <filter id="subtle-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Dış daire (Ahşap/Bakır) -->
  <circle cx="23" cy="40" r="22" fill="none" stroke="#C8925A" stroke-width="2" filter="url(#subtle-shadow)"/>

  <!-- Ev Container -->
  <g id="house">
    <!-- Ev Outline (Bakır) -->
    <path d="M 10 48 L 10 28 Q 10 26 12 26 L 34 26 Q 36 26 36 28 L 36 48 Q 36 50 34 50 L 12 50 Q 10 50 10 48 Z"
          fill="none" stroke="#C8925A" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Çatı (Bakır üçgen) -->
    <path d="M 9 28 L 23 18 L 37 28" fill="none" stroke="#C8925A" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Kişi window (Pastel Turkuaz) -->
    <circle cx="16" cy="32" r="2.5" fill="#D0E8E8" opacity="0.9"/>

    <!-- Kapı window (Pastel Turkuaz) -->
    <rect x="29" y="38" width="3" height="4" fill="#D0E8E8" opacity="0.9" rx="0.5"/>
  </g>

  <!-- Growth Arrow (Pastel Turkuaz Gradient) -->
  <g id="arrow" filter="url(#subtle-shadow)">
    <!-- Arrow shaft -->
    <path d="M 28 35 Q 35 32 42 25"
          fill="none" stroke="url(#arrowGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arrow head -->
    <path d="M 42 25 L 40 28 M 42 25 L 45 26"
          fill="none" stroke="url(#arrowGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text: EvimOs -->
  <text x="60" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600"
        fill="#235353" letter-spacing="0.3">EvimOs</text>

  <!-- Subtitle: Mülk Yönetim -->
  <text x="60" y="62" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400"
        fill="#C8925A" letter-spacing="0.2">Mülk Yönetim</text>
</svg>